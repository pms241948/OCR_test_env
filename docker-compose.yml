services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    ports:
      - "3001:3001"
    volumes:
      - backend_data:/app/data
      - backend_uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  backend_data:
  backend_uploads:
